name: build-concept-endpoint

# Builds the FLUX.2 concept-gen worker image and pushes it to GHCR.
# Uses the repo's native GITHUB_TOKEN — no external secret to configure.
# After the first successful run, make the package PUBLIC once (repo → Packages → concept-endpoint →
# Package settings → Change visibility → Public) so RunPod can pull it without registry auth.

on:
  push:
    branches: [ main, master ]
    paths: [ 'Dockerfile', 'bootstrap_models.sh', '.github/workflows/build.yml' ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free up disk (image build pulls a large CUDA base)
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL || true
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/concept-endpoint" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Image pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "\`${{ steps.img.outputs.name }}:latest\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Give this to RunPod as the endpoint imageName (make the package public first)." >> "$GITHUB_STEP_SUMMARY"
