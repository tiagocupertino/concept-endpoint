# Points ComfyUI at the models on the RunPod network volume (/runpod-volume/models).
# worker-comfyui does NOT auto-discover volume models — this file is REQUIRED. Baked to /comfyui/extra_model_paths.yaml.
runpod_volume:
  base_path: /runpod-volume/models/
  checkpoints: checkpoints/
  diffusion_models: diffusion_models/
  unet: diffusion_models/
  text_encoders: text_encoders/
  clip: text_encoders/
  vae: vae/
  loras: loras/
  controlnet: controlnet/
  upscale_models: upscale_models/
  embeddings: embeddings/
